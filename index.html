<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0284c7" />
    <meta name="description" content="FalaMadeira - European Portuguese Training System" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <title>FalaMadeira</title>
    <!-- Theme bootstrap: apply the persisted appearance preference (or system pref) to
         <html> before first paint so there is no light-mode flash. Mirrors the resolution
         logic in src/hooks/useTheme.ts (localStorage key 'fm_theme': system|light|dark). -->
    <script>
      (function () {
        try {
          var pref = localStorage.getItem('fm_theme') || 'system';
          var dark = pref === 'dark' ||
            (pref === 'system' &&
              window.matchMedia &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
