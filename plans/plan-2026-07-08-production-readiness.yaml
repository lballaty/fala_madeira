      description: Harden the edge-function Gemini prompts - level-locking (inject learner's unlocked_level and completed-lesson vocabulary so responses stay level-appropriate), explicit correction strategy (recast + brief note, per USER_MANUAL promise), pt-PT TTS locale verification with audible spot-check, and content-safety boundaries.
      command: "agent-task: update supabase/functions/gemini/index.ts system-instruction builder per the description; redeploy with supabase functions deploy gemini; record a TTS sample of 'Bom dia, tudo bem? Vou apanhar o autocarro para o Funchal.' for operator accent verification"
