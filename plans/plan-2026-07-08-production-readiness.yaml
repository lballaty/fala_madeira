    # ---------------------------------------------------------------
    # PHASE 6 - CI/CD, DEPLOYMENT & FINAL VERIFICATION
    # ---------------------------------------------------------------

    - id: local-preflight
      description: Create scripts/preflight.sh - the local quality gate (no CI service is used; deployment runs entirely from THIS device, never from GitHub) running npm run lint:eslint, npm run lint, npm test -- --run, npm run build, and npm audit --omit=dev --audit-level=high; deployment refuses to run unless preflight passes.
      command: "agent-task: write scripts/preflight.sh chaining the five checks with set -e and a clear pass/fail summary; chmod +x scripts/preflight.sh"
      validation: bash scripts/preflight.sh
      depends_on: [unit-tests, lint-tooling]
      fatal_on_failure: true

    - id: deploy-pipeline-entrypoint
      description: "Create the single local deployment pipeline entrypoint scripts/ship.sh (exposed as npm run deploy) that runs the whole from-this-device pipeline in order: (1) scripts/preflight.sh, (2) confirm .env.deploy exists and target remote dir == falamadeira.searchingfool.com, (3) scripts/deploy-verpex.sh upload, (4) post-deploy smoke check curl-ing https://falamadeira.searchingfool.com for index.html + manifest.webmanifest + sw.js returning 200. Aborts on any failure. MUST support a --dry-run flag that runs preflight + build + target-dir-scope assertion + prints the exact file manifest that WOULD upload (and, if creds present, an lftp --dry-run mirror) WITHOUT writing to the server. GitHub is source hosting only and is never part of the deploy path."
      command: "agent-task: write scripts/ship.sh chaining the four stages with set -euo pipefail and a summary, with a --dry-run branch that skips all remote writes; add npm script deploy -> bash scripts/ship.sh; chmod +x scripts/ship.sh; document the one-command flow and the dry-run in docs/PUBLISHING_GUIDE.md"
      validation: test -x scripts/ship.sh && node -e "process.exit(require('./package.json').scripts.deploy?0:1)" && grep -q -- '--dry-run' scripts/ship.sh
      depends_on: [local-preflight]
      fatal_on_failure: false

    - id: local-server-test
      description: "Server test on THIS device: serve the production dist/ build the way Verpex will (static file server with SPA history fallback to index.html, correct MIME for .webmanifest, service worker enabled) on a local port, then run the Playwright @smoke slice subset plus PWA checks (service worker registers, manifest parses, offline app-shell loads, deep-link refresh routes correctly) against http://localhost. Confirms the BUILT, statically-served app works on-device before any deploy - catches SPA-routing/base-path/SW bugs that vite dev mode hides."
      command: "agent-task: add scripts/serve-local.sh (or an npm script) serving dist/ via a static server with SPA fallback + .webmanifest MIME; write tests/e2e/local-server.spec.ts (or reuse @smoke specs with BASE_URL=http://localhost:PORT); run the suite against the local static server"
      validation: BASE_URL=http://localhost:4173 npx playwright test --grep @smoke --reporter=line
      depends_on: [vertical-slice-e2e, deploy-pipeline-entrypoint]
      fatal_on_failure: true

    - id: deploy-dry-run
      description: "Deploy dry-run before any real upload: run npm run deploy -- --dry-run. Asserts preflight passes, the build is present, the remote target resolves to ONLY the falamadeira.searchingfool.com directory (never public_html/parent/siblings), and prints the exact file manifest that would transfer. If .env.deploy creds are present it performs an lftp --dry-run mirror (no writes); if creds are pending it validates everything offline and logs that the connected dry-run is deferred. Nothing is written to the server. Gates the real verpex-deploy."
      command: npm run deploy -- --dry-run
      validation: npm run deploy -- --dry-run 2>&1 | grep -qi "dry.run"
      depends_on: [deploy-pipeline-entrypoint, local-server-test, security-verification]
      fatal_on_failure: true

    - id: verpex-deploy
      description: "USER-GATE (needs Verpex FTP/SSH host + username + password/key, provided by operator later): Create scripts/deploy-verpex.sh that first runs scripts/preflight.sh, then uploads the CONTENTS of dist/ via lftp/rsync into the account-home directory 'falamadeira.searchingfool.com' (the subdomain document root), plus a production .htaccess in that directory (SPA fallback rewrite to index.html, HTTPS redirect, immutable caching for hashed assets, no-cache for index.html and sw.js, correct webmanifest MIME); credentials + remote path read from git-ignored .env.deploy. HARD CONSTRAINT: the script must confine ALL remote operations to the falamadeira.searchingfool.com directory only - it must set the remote target to exactly that dir, must NOT operate on public_html or any sibling/parent path, and any lftp mirror must be rooted at the target dir so --delete (if used) can never remove files outside it (the account hosts the operator's other live sites). Run first deployment to https://falamadeira.searchingfool.com. Also set Supabase Auth Site URL and redirect allowlist to https://falamadeira.searchingfool.com (dashboard Auth settings) so magic links, OTP and password-reset emails redirect to production, and update APP_URL in .env.local to match."
      command: npm run deploy
      validation: "curl -fsS -o /dev/null -w '%{http_code}' https://falamadeira.searchingfool.com/manifest.webmanifest | grep -q 200"
      depends_on: [deploy-dry-run, local-server-test, vertical-slice-e2e, security-verification, client-gemini-refactor, pwa-assets, legal-pages, curriculum-normalize-author]
      fatal_on_failure: true

    - id: vertical-slice-map
      description: "Define the app's vertical slices and their layer boundaries in docs/TEST-VERTICAL-SLICES.md - each slice named with its UI entry point, the Edge Function / Supabase RPC it calls, the DB table(s) it reads/writes, and the observable backend evidence (row change + logs table entry with correlation_id) that proves the whole slice worked. Slices: (1) Auth (signup->login->logout->password reset), (2) Lesson learning (browse->open lesson->complete->XP/streak update), (3) Quiz (take->score->persist to quiz_results), (4) AI tutor chat (send->gemini edge fn->response->TTS playback), (5) Voice practice (mic input->voice-limit enforcement->transcript), (6) Settings/profile (change tutor/speed/sound->persist), (7) Feedback submissions (correction/request/ticket->row->visible status), (8) Admin review (approve/reject->status update), (9) Account deletion (delete-account edge fn->cascade removal). This map is the contract the Playwright slice suite tests against."
      command: "agent-task: author docs/TEST-VERTICAL-SLICES.md with the required markdown header and a table per slice (UI entry | API/edge | DB tables | backend evidence assertion)"
      validation: test -f docs/TEST-VERTICAL-SLICES.md && grep -qi "correlation_id" docs/TEST-VERTICAL-SLICES.md
      depends_on: [centralized-logger]
      fatal_on_failure: false

    - id: security-verification
      description: Pre-deploy security pass (runs before shipping) - confirm no key material in the built bundle, RLS behaves correctly for anon vs authenticated vs admin (two-pass check against live DB as source of truth), and edge functions reject unauthenticated calls.
      command: "agent-task: write and run scripts/verify-security.mjs - FATAL checks: (1) grep dist/ for AIzaSy/AQ. key material and service_role - none may appear (key must be server-side only), (2) REST probes as anon expecting 401/403 on profiles writes, (3) authenticated user cannot read another user's profile rows, (4) unauthenticated POST to the gemini and delete-account edge functions expecting 401. ADVISORY (log, do not fail): the current Gemini key is the dev key the operator accepted for this non-production launch (it now lives only in the edge-function secret, not the bundle) - print a reminder to rotate before treating this as real production. Script exits nonzero only on a FATAL check failure."
      validation: node scripts/verify-security.mjs
      depends_on: [client-gemini-refactor, edge-fn-account-deletion]
      fatal_on_failure: true

    - id: vertical-slice-e2e
      description: "Author and run the Playwright vertical-slice UI suite against a local preview build (npm run preview) wired to the live Supabase project and deployed edge functions - one spec per slice from docs/TEST-VERTICAL-SLICES.md. Each spec drives the REAL UI (clicks, typing, navigation) AND asserts the backend evidence for that slice: the expected DB row change and the logs-table entry carrying the correlation_id surfaced in the UI. This is the pre-ship gate - deployment depends on it passing."
      command: "agent-task: npm install -D @playwright/test; npx playwright install chromium; write tests/e2e/<slice>.spec.ts for all 9 slices using dedicated test accounts (a normal user and the liborballaty@gmail.com admin); each test captures the correlation_id from the UI and verifies the matching row via a service-role query helper; run npx playwright test against npm run preview"
      validation: npx playwright test --reporter=line
      depends_on: [vertical-slice-map, security-verification, admin-workflows, feedback-status-visibility, quiz-persistence, payments-deferred, offline-caching, curriculum-normalize-author, practice-hub, mode-vocab-srs, mode-listening-comprehension, mode-pronunciation, mode-reading, mode-writing, mode-grammar-drills, onboarding-flow, dark-mode, responsive-desktop, tts-provider-adapters]
      fatal_on_failure: true

    - id: post-deploy-smoke
      description: "Smoke-test the various pieces of the ACTUAL deployed software at https://falamadeira.searchingfool.com after deployment - a Playwright smoke run (subset of the slice specs, tagged @smoke) plus scripted probes hitting the live site: app shell loads, PWA manifest + service worker register, login works against production auth redirect, a lesson opens, an AI tutor message round-trips through the live edge function, and settings persist. Confirms the real running app - not just a preview - works end to end."
      command: "agent-task: tag @smoke on the load-bearing assertions in each slice spec; write scripts/smoke-prod.sh running (a) npx playwright test --grep @smoke with BASE_URL=https://falamadeira.searchingfool.com and (b) curl probes for /, /manifest.webmanifest, /sw.js, and the legal routes; wire scripts/smoke-prod.sh as the final stage of scripts/ship.sh"
      validation: BASE_URL=https://falamadeira.searchingfool.com npx playwright test --grep @smoke --reporter=line
      depends_on: [verpex-deploy, vertical-slice-e2e]
      fatal_on_failure: true

    - id: standards-compliance-review
      description: "Review the completed codebase against docs/ENGINEERING-STANDARDS.md (architecture, security, software design, coding best-practice) and produce docs/STANDARDS-COMPLIANCE-REPORT.md classifying each standard as compliant / partial / gap with file evidence. Ship the enforceable subset as scripts/check-standards.sh (e.g. no secrets in bundle, no bare console.* error paths, component size ceiling, no picsum/hardcoded-URL, RLS present on new tables, no duplicate animation libs) and wire it into scripts/preflight.sh so standards stay MAINTAINED on every future deploy. This is a recurring gate, not a one-off."
      command: "agent-task: run the review, write docs/STANDARDS-COMPLIANCE-REPORT.md and scripts/check-standards.sh (chmod +x), add a call to scripts/check-standards.sh inside scripts/preflight.sh; any 'gap' items must be either fixed or logged with operator sign-off"
      validation: test -x scripts/check-standards.sh && grep -q check-standards scripts/preflight.sh && bash scripts/check-standards.sh
      depends_on: [engineering-standards, perf-load-and-audio, efficiency-cost-controls, stability-async-hardening, safety-hardening, vertical-slice-e2e]
      fatal_on_failure: true

    - id: docs-sync
      description: Sync all documentation to shipped reality - USER_MANUAL (3-month scope, built features only), TEST_MANUAL (points at the Playwright suite), PUBLISHING_GUIDE (Verpex procedure), APPLICATION_DOCUMENTATION.html, README.md (replace AI Studio boilerplate), package.json name falamadeira + real version.
      command: "agent-task: run the /update-docs workflow across docs/ and README.md per the shipped v1.0 feature set; update package.json name and version fields"
      validation: "! grep -q 'ai.studio' README.md && grep -q '\"name\": \"falamadeira\"' package.json"
      depends_on: [post-deploy-smoke]
      fatal_on_failure: false

    - id: release-v1
      description: Final commit of all completed work on main and tag v1.0.0, then push main + tag to origin (GitHub is source hosting only; deployment is scripts/deploy-verpex.sh, never GitHub).
      command: git -C /Users/liborballaty/LocalProjects/GitHubProjectsDocuments/fala_madeira status --porcelain && git -C /Users/liborballaty/LocalProjects/GitHubProjectsDocuments/fala_madeira add -A && git -C /Users/liborballaty/LocalProjects/GitHubProjectsDocuments/fala_madeira commit -m "feat: FalaMadeira v1.0.0 production release" && git -C /Users/liborballaty/LocalProjects/GitHubProjectsDocuments/fala_madeira tag v1.0.0 && git -C /Users/liborballaty/LocalProjects/GitHubProjectsDocuments/fala_madeira push origin main --tags
      validation: git -C /Users/liborballaty/LocalProjects/GitHubProjectsDocuments/fala_madeira tag | grep -q v1.0.0
      depends_on: [security-verification, docs-sync, post-deploy-smoke, standards-compliance-review]
      fatal_on_failure: true
