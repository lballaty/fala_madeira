      command: "agent-task: write scripts/generate-lessons.mjs calling the gemini edge function per missing day with curriculum context + CONTENT-STANDARDS.md rules embedded; validate + regenerate failures; emit projects/falamadeira/content-review/month-N-lessons.json per month with compliance reports; after per-month operator approval merge into src/data/lessons.ts with consistent day fields 1-168"
